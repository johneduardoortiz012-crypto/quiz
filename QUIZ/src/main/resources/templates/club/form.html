<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Formulario Club</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:600px">
  <h2>🏟️ <span th:text="${club.id == null ? 'Nuevo Club' : 'Editar Club'}"></span></h2>
  <form th:action="@{/clubes/guardar}" th:object="${club}" method="post" class="card p-4 bg-white">
    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
      <label class="form-label">Nombre del Club</label>
      <input type="text" th:field="*{nombre}" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label class="form-label">Entrenador</label>
      <select th:field="*{entrenador}" class="form-select">
        <option value="">-- Sin entrenador --</option>
        <option th:each="e : ${entrenadores}"
                th:value="${e.id}"
                th:text="${e.nombre + ' ' + e.apellido}"
                th:selected="${club.entrenador != null && club.entrenador.id == e.id}"/>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Asociación</label>
      <select th:field="*{asociacion}" class="form-select">
        <option value="">-- Sin asociación --</option>
        <option th:each="a : ${asociaciones}"
                th:value="${a.id}"
                th:text="${a.nombre}"
                th:selected="${club.asociacion != null && club.asociacion.id == a.id}"/>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Competiciones</label>
      <select th:field="*{competiciones}" class="form-select" multiple size="4">
        <option th:each="comp : ${competiciones}"
                th:value="${comp.id}"
                th:text="${comp.nombre}"/>
      </select>
      <small class="text-muted">Ctrl+Click para seleccionar varias</small>
    </div>

    <button type="submit" class="btn btn-success">💾 Guardar</button>
    <a href="/clubes" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
</body>
</html>
