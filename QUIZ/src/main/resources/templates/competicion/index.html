<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Competiciones</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4">
  <h2>🏆 Competiciones</h2>
  <a href="/competiciones/nuevo" class="btn btn-primary mb-3">+ Nueva</a>
  <a href="/" class="btn btn-secondary mb-3">← Inicio</a>
  <table class="table table-bordered bg-white">
    <thead class="table-dark">
      <tr><th>ID</th><th>Nombre</th><th>Monto Premio</th><th>Fecha Inicio</th><th>Fecha Fin</th><th>Acciones</th></tr>
    </thead>
    <tbody>
      <tr th:each="c : ${competiciones}">
        <td th:text="${c.id}"/>
        <td th:text="${c.nombre}"/>
        <td th:text="${'$' + c.montoPremio}"/>
        <td th:text="${c.fechaInicio}"/>
        <td th:text="${c.fechaFin}"/>
        <td>
          <a th:href="@{/competiciones/editar/{id}(id=${c.id})}" class="btn btn-sm btn-warning">Editar</a>
          <a th:href="@{/competiciones/eliminar/{id}(id=${c.id})}" class="btn btn-sm btn-danger"
             onclick="return confirm('¿Eliminar?')">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
