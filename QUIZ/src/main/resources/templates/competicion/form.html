<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Formulario Competición</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:500px">
  <h2>🏆 <span th:text="${competicion.id == null ? 'Nueva Competición' : 'Editar Competición'}"></span></h2>
  <form th:action="@{/competiciones/guardar}" th:object="${competicion}" method="post" class="card p-4 bg-white">
    <input type="hidden" th:field="*{id}"/>
    <div class="mb-3"><label class="form-label">Nombre</label>
      <input type="text" th:field="*{nombre}" class="form-control" required/></div>
    <div class="mb-3"><label class="form-label">Monto Premio</label>
      <input type="number" th:field="*{montoPremio}" class="form-control"/></div>
    <div class="mb-3"><label class="form-label">Fecha Inicio</label>
      <input type="date" th:field="*{fechaInicio}" class="form-control"/></div>
    <div class="mb-3"><label class="form-label">Fecha Fin</label>
      <input type="date" th:field="*{fechaFin}" class="form-control"/></div>
    <button type="submit" class="btn btn-success">💾 Guardar</button>
    <a href="/competiciones" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
</body>
</html>
