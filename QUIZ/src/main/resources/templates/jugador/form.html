<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Formulario Jugador</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:500px">
  <h2>🏃 <span th:text="${jugador.id == null ? 'Nuevo Jugador' : 'Editar Jugador'}"></span></h2>
  <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post" class="card p-4 bg-white">
    <input type="hidden" th:field="*{id}"/>
    <div class="mb-3"><label class="form-label">Nombre</label>
      <input type="text" th:field="*{nombre}" class="form-control" required/></div>
    <div class="mb-3"><label class="form-label">Apellido</label>
      <input type="text" th:field="*{apellido}" class="form-control"/></div>
    <div class="mb-3"><label class="form-label">Número</label>
      <input type="number" th:field="*{numero}" class="form-control"/></div>
    <div class="mb-3"><label class="form-label">Posición</label>
      <select th:field="*{posicion}" class="form-select">
        <option value="">-- Seleccionar --</option>
        <option value="Portero">Portero</option>
        <option value="Defensa">Defensa</option>
        <option value="Mediocampista">Mediocampista</option>
        <option value="Delantero">Delantero</option>
      </select>
    </div>
    <button type="submit" class="btn btn-success">💾 Guardar</button>
    <a href="/jugadores" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
</body>
</html>
