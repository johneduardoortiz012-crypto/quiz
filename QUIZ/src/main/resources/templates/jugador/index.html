<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Jugadores</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4">
  <h2>🏃 Jugadores</h2>
  <a href="/jugadores/nuevo" class="btn btn-primary mb-3">+ Nuevo</a>
  <a href="/" class="btn btn-secondary mb-3">← Inicio</a>
  <table class="table table-bordered bg-white">
    <thead class="table-dark">
      <tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Número</th><th>Posición</th><th>Acciones</th></tr>
    </thead>
    <tbody>
      <tr th:each="j : ${jugadores}">
        <td th:text="${j.id}"/>
        <td th:text="${j.nombre}"/>
        <td th:text="${j.apellido}"/>
        <td th:text="${j.numero}"/>
        <td th:text="${j.posicion}"/>
        <td>
          <a th:href="@{/jugadores/editar/{id}(id=${j.id})}" class="btn btn-sm btn-warning">Editar</a>
          <a th:href="@{/jugadores/eliminar/{id}(id=${j.id})}" class="btn btn-sm btn-danger"
             onclick="return confirm('¿Eliminar?')">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
