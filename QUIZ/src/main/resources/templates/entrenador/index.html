<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Entrenadores</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4">
  <h2>🧑‍💼 Entrenadores</h2>
  <a href="/entrenadores/nuevo" class="btn btn-primary mb-3">+ Nuevo</a>
  <a href="/" class="btn btn-secondary mb-3">← Inicio</a>
  <table class="table table-bordered bg-white">
    <thead class="table-dark"><tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Edad</th><th>Nacionalidad</th><th>Acciones</th></tr></thead>
    <tbody>
      <tr th:each="e : ${entrenadores}">
        <td th:text="${e.id}"/><td th:text="${e.nombre}"/><td th:text="${e.apellido}"/>
        <td th:text="${e.edad}"/><td th:text="${e.nacionalidad}"/>
        <td>
          <a th:href="@{/entrenadores/editar/{id}(id=${e.id})}" class="btn btn-sm btn-warning">Editar</a>
          <a th:href="@{/entrenadores/eliminar/{id}(id=${e.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
