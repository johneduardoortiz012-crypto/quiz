<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Formulario Entrenador</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:500px">
  <h2>🧑‍💼 Entrenador</h2>
  <form th:action="@{/entrenadores/guardar}" th:object="${entrenador}" method="post" class="card p-4 bg-white">
    <input type="hidden" th:field="*{id}"/>
    <div class="mb-3"><label class="form-label">Nombre</label><input type="text" th:field="*{nombre}" class="form-control" required/></div>
    <div class="mb-3"><label class="form-label">Apellido</label><input type="text" th:field="*{apellido}" class="form-control"/></div>
    <div class="mb-3"><label class="form-label">Edad</label><input type="number" th:field="*{edad}" class="form-control"/></div>
    <div class="mb-3"><label class="form-label">Nacionalidad</label><input type="text" th:field="*{nacionalidad}" class="form-control"/></div>
    <button type="submit" class="btn btn-success">💾 Guardar</button>
    <a href="/entrenadores" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
</body>
</html>
