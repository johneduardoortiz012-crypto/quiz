<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Formulario Asociación</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:500px">
  <h2>🏢 <span th:text="${asociacion.id == null ? 'Nueva Asociación' : 'Editar Asociación'}"></span></h2>
  <form th:action="@{/asociaciones/guardar}" th:object="${asociacion}" method="post" class="card p-4 bg-white">
    <input type="hidden" th:field="*{id}"/>
    <div class="mb-3"><label class="form-label">Nombre</label>
      <input type="text" th:field="*{nombre}" class="form-control" required/></div>
    <div class="mb-3"><label class="form-label">País</label>
      <input type="text" th:field="*{pais}" class="form-control"/></div>
    <div class="mb-3"><label class="form-label">Presidente</label>
      <input type="text" th:field="*{presidente}" class="form-control"/></div>
    <button type="submit" class="btn btn-success">💾 Guardar</button>
    <a href="/asociaciones" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
</body>
</html>
