<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Asociaciones</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4">
  <h2>🏢 Asociaciones</h2>
  <a href="/asociaciones/nuevo" class="btn btn-primary mb-3">+ Nueva</a>
  <a href="/" class="btn btn-secondary mb-3">← Inicio</a>
  <table class="table table-bordered bg-white">
    <thead class="table-dark">
      <tr><th>ID</th><th>Nombre</th><th>País</th><th>Presidente</th><th>Acciones</th></tr>
    </thead>
    <tbody>
      <tr th:each="a : ${asociaciones}">
        <td th:text="${a.id}"/>
        <td th:text="${a.nombre}"/>
        <td th:text="${a.pais}"/>
        <td th:text="${a.presidente}"/>
        <td>
          <a th:href="@{/asociaciones/editar/{id}(id=${a.id})}" class="btn btn-sm btn-warning">Editar</a>
          <a th:href="@{/asociaciones/eliminar/{id}(id=${a.id})}" class="btn btn-sm btn-danger"
             onclick="return confirm('¿Eliminar?')">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
